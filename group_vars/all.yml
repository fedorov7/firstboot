---
user_name: "{{ ansible_facts['user_id'] }}"
user_home: "{{ ansible_facts['env']['HOME'] }}"
user_email: "your-email@example.com"
git_user_name: "Your Name"

astronvim_repo: "https://github.com/fedorov7/astronvim-config-v4.git"
neovim_force_cleanup: false
neovim_cleanup_stale: true
neovim_cleanup_paths:
  - "{{ user_home }}/.config/nvim"
  - "{{ user_home }}/.local/share/nvim"
  - "{{ user_home }}/.local/state/nvim"
  - "{{ user_home }}/.cache/nvim"

nvm_version: "v0.39.7"
node_version: "--lts"

# GitHub Personal Access Token for Claude MCP github server (optional).
# Pass at runtime: -e github_token=ghp_xxx.
# Codex uses codex_github_token_env_var instead to avoid storing PATs in config.
github_token: ""

# Embedded / UEFI workstation profile.
workstation_profile_embedded_enabled: false
workstation_profile_uefi_enabled: false
workstation_profile_security_tools_enabled: false
embedded_probe_udev_rules_enabled: true
embedded_access_groups:
  - uucp
  - lock
embedded_probe_access_group: plugdev

# Codex skills profile.
#
# Keep this list narrow: Codex loads skill descriptions into the startup
# context, so broad packs create duplicate entries and trigger context-budget
# truncation warnings.
codex_mcp_allowlist:
  - context7
  - openaiDeveloperDocs
  - memory
  - fetch
  - sequential-thinking
codex_mcp_prune_unmanaged: false
codex_context7_remove_inline_api_key: true

# Optional MCP servers with broader access or heavier runtime behavior.
codex_github_mcp_enabled: false
codex_github_token_env_var: GITHUB_PERSONAL_ACCESS_TOKEN
codex_serena_enabled: false
codex_remove_legacy_external_skill_sources: false

codex_curated_skills:
  - pdf
  - doc                         # Enable when editing .docx documents.

codex_superpowers_skills:
  - systematic-debugging
  - verification-before-completion
  - using-superpowers          # Broad trigger; useful only if you want skills enforced every turn.
  - test-driven-development    # Enable for strict TDD workflows.
  - writing-plans              # Enable for large planned implementations.
  - executing-plans            # Enable when executing saved plans across sessions.
  - receiving-code-review      # Enable when iterating on external review feedback.
  - requesting-code-review     # Enable when you want formal review checkpoints.
  - brainstorming               # Broad creative workflow gate.
  - writing-skills
  # - dispatching-parallel-agents  # Parallel research/development workflow.
  # - subagent-driven-development  # Multi-agent implementation workflow.
  # - using-git-worktrees          # Isolated feature branch workflow.
  # - finishing-a-development-branch

codex_karpathy_skills:
  - karpathy-guidelines

codex_claude_skills:
  - code-reviewer
  - cpp-pro
  - debugging-wizard
  - embedded-systems
  - security-reviewer
  - test-master
  - api-designer               # API/backend work.
  - architecture-designer      # Enable for ADRs and high-level system architecture.
  - cli-developer              # Enable when building command-line tools.
  - code-documenter            # Enable when writing API docs, tutorials, or docstrings.
  - devops-engineer            # CI/CD and infrastructure.
  - legacy-modernizer          # Enable for large migrations of older codebases.
  - python-pro                 # Python application development.
  - secure-code-guardian       # Enable for auth/input-validation implementation work.
  - spec-miner                 # Legacy/undocumented system discovery.
  - the-fool                   # Enable for explicit red-team / devil's advocate review.
  # - csharp-developer             # .NET/C# work.
  # - database-optimizer           # Database tuning.
  # - fullstack-guardian           # Full-stack feature work.
  # - golang-pro                   # Go development.
  # - java-architect               # Java/Spring architecture.
  # - kubernetes-specialist        # Kubernetes operations.
  # - microservices-architect      # Distributed services design.
  # - rust-engineer                # Rust systems development.
  # - sql-pro                      # SQL design and optimization.
  # - terraform-engineer           # Terraform infrastructure.
  # - typescript-pro               # TypeScript development.
