---
- name: Install neovim
  become: true
  community.general.pacman:
    name: neovim
    state: present

- name: Remove existing Neovim config, plugins, tools, state, and cache
  file:
    path: "{{ item }}"
    state: absent
  loop: "{{ neovim_cleanup_paths }}"

- name: Clone AstroNvim config
  git:
    repo: "{{ astronvim_repo }}"
    dest: "{{ user_home }}/.config/nvim"
