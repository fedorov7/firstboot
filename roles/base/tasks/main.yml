---
- name: Ensure en_US.UTF-8 locale is generated
  become: true
  community.general.locale_gen:
    name: en_US.UTF-8
    state: present

- name: Set system locale
  become: true
  copy:
    content: "LANG=en_US.UTF-8\n"
    dest: /etc/locale.conf
  register: locale_conf

- name: Full system upgrade
  become: true
  community.general.pacman:
    update_cache: true
    upgrade: true

- name: Install base packages
  become: true
  community.general.pacman:
    name:
      - base-devel
      - git
      - openssh
      - curl
      - wget
      - gawk
      - zip
      - unzip
      - htop
      - gdu
      - duf
      - fzf
      - openbsd-netcat
      - vim
      # Search and navigation
      - ripgrep
      - fd
      - tree
      - bat
      # Data processing
      - jq
      - go-yq
      # Git and collaboration
      - github-cli
      - git-delta
      # Task runners and benchmarking
      - just
      - entr
      - hyperfine
      - direnv
      # Validation and linting
      - shellcheck
      - shfmt
      - yamllint
      - ansible-lint
      - pre-commit
      # Networking and system inspection
      - lsof
      - rsync
      - socat
      - tcpdump
      # Structural diff
      - difftastic
      # Debugging and profiling
      - strace
      - ltrace
      - gdb
      - valgrind
      - perf
      # Documentation
      - man-db
      - man-pages
      # Terminal multiplexer
      - tmux
    state: present
