---
- name: Install OpenAI Codex CLI via npm (nvm)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    npm ls -g @openai/codex 2>/dev/null || npm i -g @openai/codex
  args:
    executable: /bin/bash
  register: codex_install
  changed_when: "'added' in codex_install.stdout"

# ── MCP servers ──

- name: Configure Codex MCP — context7 (library documentation)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add context7 -- npx -y @upstash/context7-mcp
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.codex/mcp/context7"

- name: Configure Codex MCP — memory (persistent knowledge graph)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add memory --env MEMORY_FILE_PATH={{ user_home }}/.local/share/codex/memory.jsonl -- npx -y @modelcontextprotocol/server-memory
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.codex/mcp/memory"

- name: Ensure Codex memory directory exists
  file:
    path: "{{ user_home }}/.local/share/codex"
    state: directory

- name: Configure Codex MCP — fetch (web documentation retrieval)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add fetch -- uvx mcp-server-fetch
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.codex/mcp/fetch"

- name: Configure Codex MCP — sequential-thinking (structured reasoning)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add sequential-thinking -- npx -y @modelcontextprotocol/server-sequential-thinking
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.codex/mcp/sequential-thinking"

- name: Configure Codex MCP — github (code search, issues, PRs)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add github --env GITHUB_PERSONAL_ACCESS_TOKEN={{ github_token }} -- npx -y @modelcontextprotocol/server-github
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.codex/mcp/github"
  when: github_token is defined and github_token | length > 0

# ── Skills: curated (from openai/skills) ──

- name: Install curated codex skills
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    python3 {{ user_home }}/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py \
      --repo openai/skills --path skills/.curated/{{ item }}
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.codex/skills/{{ item }}"
  loop:
    - pdf
    - doc

# ── Skills: superpowers (clone + symlink) ──

- name: Clone superpowers skills repo
  git:
    repo: https://github.com/obra/superpowers.git
    dest: "{{ user_home }}/.codex/superpowers"
    update: true

- name: Ensure agents skills directory exists
  file:
    path: "{{ user_home }}/.agents/skills"
    state: directory

- name: Symlink superpowers skills
  file:
    src: "{{ user_home }}/.codex/superpowers/skills"
    dest: "{{ user_home }}/.agents/skills/superpowers"
    state: link

# ── Skills: claude-skills / fullstack-dev-skills (clone + symlink) ──

- name: Clone claude-skills repo
  git:
    repo: https://github.com/Jeffallan/claude-skills.git
    dest: "{{ user_home }}/.codex/claude-skills"
    update: true

- name: Symlink claude-skills skills
  file:
    src: "{{ user_home }}/.codex/claude-skills/skills"
    dest: "{{ user_home }}/.agents/skills/claude-skills"
    state: link
