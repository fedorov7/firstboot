---
# ── Prerequisites check ──

- name: Check if nvm is available
  stat:
    path: "{{ user_home }}/.nvm/nvm.sh"
  register: nvm_available

- name: Fail if nvm is not installed (run nodejs role first)
  fail:
    msg: "nvm is not installed. Run the nodejs role first: ansible-playbook site.yml --tags nodejs"
  when: not nvm_available.stat.exists

- name: Check if uv is available (needed for fetch MCP)
  command: which uv
  register: uv_available
  changed_when: false
  failed_when: false

# ── Install Codex CLI ──

- name: Check if codex is installed
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    npm ls -g @openai/codex 2>/dev/null
  args:
    executable: /bin/bash
  register: codex_check
  changed_when: false
  failed_when: false

- name: Install OpenAI Codex CLI via npm (nvm)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    npm i -g @openai/codex
  args:
    executable: /bin/bash
  when: codex_check.rc != 0

# ── MCP servers ──
# Codex stores MCP in ~/.codex/config.toml under [mcp_servers.<name>]

- name: Read codex config.toml
  slurp:
    src: "{{ user_home }}/.codex/config.toml"
  register: codex_config_raw
  failed_when: false

- name: Set codex config content
  set_fact:
    codex_config: "{{ (codex_config_raw.content | default('') | b64decode) if codex_config_raw.content is defined else '' }}"

- name: Set desired Codex MCP server allowlist
  set_fact:
    codex_mcp_desired_servers: >-
      {{ ((codex_mcp_allowlist | default([]))
          + (['github'] if (codex_github_mcp_enabled | default(false) | bool) else [])
          + (['serena'] if (codex_serena_enabled | default(false) | bool) else []))
         | unique | list }}

- name: Find existing top-level Codex MCP servers
  set_fact:
    codex_mcp_existing_servers: "{{ codex_config | regex_findall('(?m)^\\[mcp_servers\\.([^.\\]]+)\\]\\s*$') | unique | list }}"

- name: Set Codex context7 MCP config block
  set_fact:
    codex_context7_mcp_block: "{{ codex_config | regex_search('(?ms)^\\[mcp_servers\\.context7\\].*?(?=^\\[mcp_servers\\.|\\Z)') | default('', true) }}"

- name: Remove stale Codex MCP servers outside allowlist
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp remove {{ item }}
  args:
    executable: /bin/bash
  loop: "{{ codex_mcp_existing_servers | difference(codex_mcp_desired_servers) }}"
  loop_control:
    label: "{{ item }}"

- name: Remove archived Codex GitHub MCP if present
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp remove github
  args:
    executable: /bin/bash
  when:
    - "'github' in codex_mcp_desired_servers"
    - "'@modelcontextprotocol/server-github' in codex_config"

- name: Remove Codex context7 MCP with inline API key
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp remove context7
  args:
    executable: /bin/bash
  when:
    - codex_context7_remove_inline_api_key | default(true) | bool
    - "'context7' in codex_mcp_desired_servers"
    - "'@upstash/context7-mcp' in codex_context7_mcp_block"
    - "'--api-key' in codex_context7_mcp_block"

- name: Read codex config.toml after MCP cleanup
  slurp:
    src: "{{ user_home }}/.codex/config.toml"
  register: codex_config_clean_raw
  failed_when: false

- name: Set cleaned codex config content
  set_fact:
    codex_config_clean: "{{ (codex_config_clean_raw.content | default('') | b64decode) if codex_config_clean_raw.content is defined else '' }}"

- name: Configure Codex MCP — context7 (library documentation)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add context7 -- npx -y @upstash/context7-mcp
  args:
    executable: /bin/bash
  when:
    - "'context7' in codex_mcp_desired_servers"
    - "'[mcp_servers.context7]' not in codex_config_clean"

- name: Configure Codex MCP — OpenAI Developer Docs
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add openaiDeveloperDocs --url https://developers.openai.com/mcp
  args:
    executable: /bin/bash
  when:
    - "'openaiDeveloperDocs' in codex_mcp_desired_servers"
    - "'[mcp_servers.openaiDeveloperDocs]' not in codex_config_clean"

- name: Ensure Codex memory directory exists
  file:
    path: "{{ user_home }}/.local/share/codex"
    state: directory
  when: "'memory' in codex_mcp_desired_servers"

- name: Configure Codex MCP — memory (persistent knowledge graph)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add memory --env MEMORY_FILE_PATH={{ user_home }}/.local/share/codex/memory.jsonl -- npx -y @modelcontextprotocol/server-memory
  args:
    executable: /bin/bash
  when:
    - "'memory' in codex_mcp_desired_servers"
    - "'[mcp_servers.memory]' not in codex_config_clean"

- name: Configure Codex MCP — fetch (web documentation retrieval)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add fetch -- uvx mcp-server-fetch
  args:
    executable: /bin/bash
  when:
    - "'fetch' in codex_mcp_desired_servers"
    - "'[mcp_servers.fetch]' not in codex_config_clean"
    - uv_available.rc == 0

- name: Configure Codex MCP — sequential-thinking (structured reasoning)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add sequential-thinking -- npx -y @modelcontextprotocol/server-sequential-thinking
  args:
    executable: /bin/bash
  when:
    - "'sequential-thinking' in codex_mcp_desired_servers"
    - "'[mcp_servers.sequential-thinking]' not in codex_config_clean"

- name: Configure Codex MCP — github (official remote server)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add github --url https://api.githubcopilot.com/mcp/ --bearer-token-env-var {{ codex_github_token_env_var | default('GITHUB_PERSONAL_ACCESS_TOKEN') }}
  args:
    executable: /bin/bash
  when:
    - "'github' in codex_mcp_desired_servers"
    - "'[mcp_servers.github]' not in codex_config_clean"

- name: Fail if Serena MCP is requested but uv is unavailable
  fail:
    msg: "Serena MCP requires uv/uvx. Run the python role first or disable codex_serena_enabled."
  when:
    - "'serena' in codex_mcp_desired_servers"
    - uv_available.rc != 0

- name: Configure Codex MCP — serena (semantic code tools)
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    codex mcp add serena -- uvx --from git+https://github.com/oraios/serena serena start-mcp-server --project-from-cwd --context=codex
  args:
    executable: /bin/bash
  when:
    - "'serena' in codex_mcp_desired_servers"
    - "'[mcp_servers.serena]' not in codex_config_clean"
    - uv_available.rc == 0

# ── Skills: optimized allowlist ──

- name: Set legacy Codex curated skills managed by this role
  set_fact:
    codex_legacy_curated_skills:
      - api-designer
      - architecture-designer
      - cli-developer
      - code-documenter
      - code-reviewer
      - cpp-pro
      - debugging-wizard
      - doc
      - embedded-systems
      - fullstack-guardian
      - legacy-modernizer
      - pandas-pro
      - pdf
      - python-pro
      - rust-engineer
      - secure-code-guardian
      - security-reviewer
      - spec-miner
      - test-master
      - the-fool

- name: Remove obsolete curated Codex skills managed by this role
  file:
    path: "{{ user_home }}/.codex/skills/{{ item }}"
    state: absent
  loop: "{{ codex_legacy_curated_skills | difference(codex_curated_skills | default([])) }}"

- name: Install curated Codex skills from allowlist
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    python3 {{ user_home }}/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py \
      --repo openai/skills --path skills/.curated/{{ item }}
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.codex/skills/{{ item }}"
  loop: "{{ codex_curated_skills | default([]) }}"

- name: Ensure Codex skill source directory exists
  file:
    path: "{{ user_home }}/.local/share/codex/skill-sources"
    state: directory

- name: Remove obsolete Codex external skill source directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ user_home }}/.codex/superpowers"
    - "{{ user_home }}/.codex/claude-skills"

- name: Ensure agents skills directory exists
  file:
    path: "{{ user_home }}/.agents/skills"
    state: directory

# ── Skills: superpowers (clone source + symlink allowlist) ──

- name: Clone superpowers skills repo
  git:
    repo: https://github.com/obra/superpowers.git
    dest: "{{ user_home }}/.local/share/codex/skill-sources/superpowers"
    update: true
  when: (codex_superpowers_skills | default([]) | length) > 0

- name: Stat Codex superpowers namespace
  stat:
    path: "{{ user_home }}/.agents/skills/superpowers"
    follow: false
  register: codex_superpowers_namespace

- name: Remove incompatible Codex superpowers namespace
  file:
    path: "{{ user_home }}/.agents/skills/superpowers"
    state: absent
  when:
    - codex_superpowers_namespace.stat.exists
    - not (codex_superpowers_namespace.stat.isdir | default(false))

- name: Ensure Codex superpowers namespace directory exists
  file:
    path: "{{ user_home }}/.agents/skills/superpowers"
    state: directory

- name: Find existing Codex superpowers skill entries
  find:
    paths: "{{ user_home }}/.agents/skills/superpowers"
    file_type: any
    recurse: false
  register: codex_superpowers_existing

- name: Remove stale Codex superpowers skills
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ codex_superpowers_existing.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: (item.path | basename) not in (codex_superpowers_skills | default([]))

- name: Check selected Codex superpowers skills exist
  stat:
    path: "{{ user_home }}/.local/share/codex/skill-sources/superpowers/skills/{{ item }}"
  register: codex_superpowers_skill_checks
  loop: "{{ codex_superpowers_skills | default([]) }}"

- name: Fail if selected Codex superpowers skill is missing
  fail:
    msg: "Selected superpowers skill '{{ item.item }}' was not found in the cloned source repo."
  loop: "{{ codex_superpowers_skill_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when: not (item.stat.isdir | default(false))

- name: Symlink selected Codex superpowers skills
  file:
    src: "{{ user_home }}/.local/share/codex/skill-sources/superpowers/skills/{{ item }}"
    dest: "{{ user_home }}/.agents/skills/superpowers/{{ item }}"
    state: link
    force: true
  loop: "{{ codex_superpowers_skills | default([]) }}"

