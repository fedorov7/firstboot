---
- name: Install Lua
  become: true
  community.general.pacman:
    name: lua
    state: present

- name: Configure WSL if applicable
  block:
    - name: Check if running in WSL
      stat:
        path: /proc/sys/fs/binfmt_misc/WSLInterop
      register: wsl_check

    - name: Configure wsl.conf to disable Windows PATH
      become: true
      ini_file:
        path: /etc/wsl.conf
        section: interop
        option: appendWindowsPath
        value: "false"
      when: wsl_check.stat.exists
