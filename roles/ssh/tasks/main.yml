---
- name: Ensure .ssh directory exists
  file:
    path: "{{ user_home }}/.ssh"
    state: directory
    mode: "0700"

- name: Generate ed25519 SSH key
  community.crypto.openssh_keypair:
    path: "{{ user_home }}/.ssh/id_ed25519"
    type: ed25519
    comment: "{{ user_email }}"
    state: present
  register: ssh_key

- name: Display public key (add to GitHub)
  debug:
    msg: "{{ lookup('file', user_home + '/.ssh/id_ed25519.pub') }}"
  when: ssh_key.changed

- name: Configure git user
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - { name: "user.name", value: "{{ git_user_name }}" }
    - { name: "user.email", value: "{{ user_email }}" }
