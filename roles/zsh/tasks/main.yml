---
- name: Install zsh
  become: true
  community.general.pacman:
    name: zsh
    state: present

- name: Install zsh-antidote from AUR
  command: yay -S --noconfirm zsh-antidote
  args:
    creates: /usr/share/zsh-antidote

- name: Set zsh as default shell
  become: true
  user:
    name: "{{ user_name }}"
    shell: /bin/zsh

- name: Copy .zshrc
  copy:
    src: zshrc
    dest: "{{ user_home }}/.zshrc"
    backup: true
- name: Copy .zsh_plugins.txt
  copy:
    src: zsh_plugins.txt
    dest: "{{ user_home }}/.zsh_plugins.txt"
    backup: true

- name: Copy .p10k.zsh
  copy:
    src: p10k.zsh
    dest: "{{ user_home }}/.p10k.zsh"
    backup: true
