---
# ── Install Claude CLI ──

- name: Check if Claude CLI is installed
  command: which claude
  register: claude_check
  changed_when: false
  failed_when: false

- name: Install Claude CLI
  shell: curl -fsSL https://claude.ai/install.sh | bash
  when: claude_check.rc != 0

# ── Settings ──

- name: Ensure .claude directory exists
  file:
    path: "{{ user_home }}/.claude"
    state: directory
    mode: "0700"

- name: Deploy Claude settings.json
  copy:
    src: settings.json
    dest: "{{ user_home }}/.claude/settings.json"
    backup: true

# ── Prerequisites check ──

- name: Check if uv is available (needed for fetch MCP)
  command: which uv
  register: uv_available
  changed_when: false
  failed_when: false

# ── MCP servers ──
# Claude stores user-scope MCP in ~/.claude.json under "mcpServers"
# and project-scope under "projects.<path>.mcpServers".
# We use --scope user so all projects see the same servers.

- name: Read current Claude user config
  slurp:
    src: "{{ user_home }}/.claude.json"
  register: claude_json_raw
  failed_when: false

- name: Parse Claude user config
  set_fact:
    claude_mcp_servers: "{{ ((claude_json_raw.content | b64decode | from_json).mcpServers | default({})) if claude_json_raw.content is defined else {} }}"

- name: Configure Claude MCP — context7 (library documentation)
  command: claude mcp add --scope user context7 -- npx -y @upstash/context7-mcp
  when: "'context7' not in claude_mcp_servers"

- name: Ensure Claude memory directory exists
  file:
    path: "{{ user_home }}/.local/share/claude"
    state: directory

- name: Configure Claude MCP — memory (persistent knowledge graph)
  command: >
    claude mcp add --scope user memory
    -e MEMORY_FILE_PATH={{ user_home }}/.local/share/claude/memory.jsonl
    -- npx -y @modelcontextprotocol/server-memory
  when: "'memory' not in claude_mcp_servers"

- name: Configure Claude MCP — fetch (web documentation retrieval)
  command: claude mcp add --scope user fetch -- uvx mcp-server-fetch
  when:
    - "'fetch' not in claude_mcp_servers"
    - uv_available.rc == 0

- name: Configure Claude MCP — sequential-thinking (structured reasoning)
  command: claude mcp add --scope user sequential-thinking -- npx -y @modelcontextprotocol/server-sequential-thinking
  when: "'sequential-thinking' not in claude_mcp_servers"

- name: Configure Claude MCP — github (code search, issues, PRs)
  command: >
    claude mcp add --scope user github
    -e GITHUB_PERSONAL_ACCESS_TOKEN={{ github_token }}
    -- npx -y @modelcontextprotocol/server-github
  when:
    - "'github' not in claude_mcp_servers"
    - github_token is defined
    - github_token | length > 0

# ── Remove obsolete MCP servers ──

- name: Remove sentry MCP from user scope if present
  command: claude mcp remove --scope user sentry
  when: "'sentry' in claude_mcp_servers"

- name: Remove playwright MCP from user scope if present
  command: claude mcp remove --scope user playwright
  when: "'playwright' in claude_mcp_servers"

# ── Clean up old project-scope MCPs ──
# Earlier MCPs may have been added at project scope (default).
# We migrate them to user scope above and remove project-scope duplicates.

- name: Read Claude config for project-scope cleanup
  slurp:
    src: "{{ user_home }}/.claude.json"
  register: claude_json_updated
  failed_when: false

- name: Find projects with legacy project-scope MCPs
  set_fact:
    projects_with_mcp: >-
      {{ ((claude_json_updated.content | b64decode | from_json).projects | default({}))
         | dict2items
         | selectattr('value.mcpServers', 'defined')
         | selectattr('value.mcpServers', 'mapping')
         | list }}
  when: claude_json_updated.content is defined

- name: Remove obsolete project-scope sentry MCP
  command: claude mcp remove --scope project sentry
  args:
    chdir: "{{ item.key }}"
  loop: "{{ projects_with_mcp | default([]) }}"
  when:
    - "'sentry' in (item.value.mcpServers | default({}))"
  failed_when: false

- name: Remove obsolete project-scope playwright MCP
  command: claude mcp remove --scope project playwright
  args:
    chdir: "{{ item.key }}"
  loop: "{{ projects_with_mcp | default([]) }}"
  when:
    - "'playwright' in (item.value.mcpServers | default({}))"
  failed_when: false

# ── Plugins / Marketplaces ──

- name: Check installed marketplaces
  stat:
    path: "{{ user_home }}/.claude/plugins/marketplaces/{{ item.name }}"
  register: marketplace_checks
  loop:
    - name: claude-plugins-official
      source: anthropics/claude-plugins-official
    - name: superpowers-dev
      source: https://github.com/obra/superpowers
    - name: fullstack-dev-skills
      source: https://github.com/Jeffallan/claude-skills

- name: Install missing Claude plugin marketplaces
  command: claude plugin marketplace add {{ item.item.source }}
  loop: "{{ marketplace_checks.results }}"
  when: not item.stat.exists
  loop_control:
    label: "{{ item.item.name }}"

- name: Enable Claude plugins
  command: claude plugin enable "{{ item }}"
  loop:
    - superpowers@claude-plugins-official
    - context-engineering-fundamentals@claude-plugins-official
    - agent-architecture@claude-plugins-official
    - agent-evaluation@claude-plugins-official
    - agent-development@claude-plugins-official
    - cognitive-architecture@claude-plugins-official
    - fullstack-dev-skills@fullstack-dev-skills
    - clangd-lsp@claude-plugins-official
  changed_when: false
