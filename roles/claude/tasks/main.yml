---
- name: Check if Claude CLI is installed
  command: which claude
  register: claude_check
  changed_when: false
  failed_when: false

- name: Install Claude CLI
  shell: curl -fsSL https://claude.ai/install.sh | bash
  when: claude_check.rc != 0

# ── Settings ──

- name: Ensure .claude directory exists
  file:
    path: "{{ user_home }}/.claude"
    state: directory
    mode: "0700"

- name: Deploy Claude settings.json
  copy:
    src: settings.json
    dest: "{{ user_home }}/.claude/settings.json"
    backup: true

# ── MCP servers ──

- name: Configure Claude MCP — context7 (library documentation)
  command: claude mcp add --scope user context7 -- npx -y @upstash/context7-mcp
  args:
    creates: "{{ user_home }}/.claude/.mcp-context7-configured"
  register: claude_mcp_context7

- name: Mark context7 MCP as configured
  file:
    path: "{{ user_home }}/.claude/.mcp-context7-configured"
    state: touch
  when: claude_mcp_context7.changed

- name: Ensure Claude memory directory exists
  file:
    path: "{{ user_home }}/.local/share/claude"
    state: directory

- name: Configure Claude MCP — memory (persistent knowledge graph)
  command: >
    claude mcp add --scope user memory
    -e MEMORY_FILE_PATH={{ user_home }}/.local/share/claude/memory.jsonl
    -- npx -y @modelcontextprotocol/server-memory
  args:
    creates: "{{ user_home }}/.claude/.mcp-memory-configured"
  register: claude_mcp_memory

- name: Mark memory MCP as configured
  file:
    path: "{{ user_home }}/.claude/.mcp-memory-configured"
    state: touch
  when: claude_mcp_memory.changed

- name: Configure Claude MCP — fetch (web documentation retrieval)
  command: claude mcp add --scope user fetch -- uvx mcp-server-fetch
  args:
    creates: "{{ user_home }}/.claude/.mcp-fetch-configured"
  register: claude_mcp_fetch

- name: Mark fetch MCP as configured
  file:
    path: "{{ user_home }}/.claude/.mcp-fetch-configured"
    state: touch
  when: claude_mcp_fetch.changed

- name: Configure Claude MCP — sequential-thinking (structured reasoning)
  command: claude mcp add --scope user sequential-thinking -- npx -y @modelcontextprotocol/server-sequential-thinking
  args:
    creates: "{{ user_home }}/.claude/.mcp-sequential-thinking-configured"
  register: claude_mcp_seqthink

- name: Mark sequential-thinking MCP as configured
  file:
    path: "{{ user_home }}/.claude/.mcp-sequential-thinking-configured"
    state: touch
  when: claude_mcp_seqthink.changed

- name: Configure Claude MCP — github (code search, issues, PRs)
  command: >
    claude mcp add --scope user github
    -e GITHUB_PERSONAL_ACCESS_TOKEN={{ github_token }}
    -- npx -y @modelcontextprotocol/server-github
  args:
    creates: "{{ user_home }}/.claude/.mcp-github-configured"
  register: claude_mcp_github
  when: github_token is defined and github_token | length > 0

- name: Mark github MCP as configured
  file:
    path: "{{ user_home }}/.claude/.mcp-github-configured"
    state: touch
  when: claude_mcp_github is changed

# ── Plugins / Marketplaces ──

- name: Install Claude plugin marketplaces
  command: claude plugin marketplace add {{ item.name }} {{ item.url }}
  args:
    creates: "{{ user_home }}/.claude/plugins/marketplaces/{{ item.name }}"
  loop:
    - name: claude-plugins-official
      url: https://github.com/anthropics/claude-code-plugins.git
    - name: context-engineering-marketplace
      url: https://github.com/anthropics/claude-code-plugins.git
    - name: superpowers-marketplace
      url: https://github.com/obra/superpowers.git
    - name: fullstack-dev-skills
      url: https://github.com/Jeffallan/claude-skills.git

- name: Enable Claude plugins
  command: claude plugin enable "{{ item }}"
  loop:
    - superpowers@claude-plugins-official
    - context-engineering-fundamentals@context-engineering-marketplace
    - agent-architecture@context-engineering-marketplace
    - agent-evaluation@context-engineering-marketplace
    - agent-development@context-engineering-marketplace
    - cognitive-architecture@context-engineering-marketplace
    - fullstack-dev-skills@fullstack-dev-skills
    - clangd-lsp@claude-plugins-official
  changed_when: false
